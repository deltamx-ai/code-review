openapi: 3.0.3
info:
  title: code-review HTTP API
  version: 0.2.0
  description: |
    Local HTTP API for the code-review service.
    This API wraps the same service-layer flows used by the CLI.
servers:
  - url: http://127.0.0.1:3000
    description: Local default server
  - url: http://localhost:3000
    description: Localhost alias
paths:
  /api/health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [system]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                default:
                  value:
                    ok: true
                    service: code-review
  /api/models:
    get:
      summary: List available models
      operationId: listModels
      tags: [system]
      responses:
        '200':
          description: Model list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelList'
        '400':
          $ref: '#/components/responses/ApiErrorResponse'
  /api/validate:
    post:
      summary: Validate review input admission
      operationId: validateReviewInput
      tags: [review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptArgs'
            examples:
              standard:
                value:
                  mode: standard
                  stack: Rust + Axum + PostgreSQL
                  goal: 修复重复下单
                  rules:
                    - 一个订单只能支付一次
                    - 幂等键必须生效
                  files:
                    - src/order/service.rs
                  format: json
      responses:
        '200':
          description: Admission result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdmissionResult'
        '400':
          $ref: '#/components/responses/ApiErrorResponse'
  /api/prompt:
    post:
      summary: Build prompt from structured input
      operationId: buildPrompt
      tags: [review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptArgs'
            examples:
              standard:
                value:
                  mode: standard
                  stack: Rust + Axum + PostgreSQL
                  goal: 修复重复下单
                  why: 线上偶发重复提交
                  rules:
                    - 一个订单只能支付一次
                    - 幂等键必须生效
                  expected_normal: 首次提交成功
                  expected_error: 重复提交返回冲突
                  expected_edge: 网络重试不应双写
                  files:
                    - src/order/service.rs
                  format: json
      responses:
        '200':
          description: Prompt output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptOutput'
        '400':
          $ref: '#/components/responses/ApiErrorResponse'
  /api/assemble:
    post:
      summary: Assemble prompt args with enrichments
      operationId: assemblePromptArgs
      tags: [review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptArgs'
            examples:
              jira:
                value:
                  mode: standard
                  jira: PROJ-123
                  jira_base_url: https://your-company.atlassian.net
                  jira_provider: native
                  format: json
      responses:
        '200':
          description: Assembled prompt args
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptArgs'
        '400':
          $ref: '#/components/responses/ApiErrorResponse'
  /api/run:
    post:
      summary: Build prompt from git diff range
      operationId: runPromptFromGitDiff
      tags: [review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunArgs'
            examples:
              default:
                value:
                  git: HEAD~1..HEAD
                  repo: .
                  prompt:
                    mode: standard
                    stack: Rust + Axum + PostgreSQL
                    goal: 修复重复下单
                    rules:
                      - 一个订单只能支付一次
                      - 幂等键必须生效
                    format: json
                  include_context: true
                  context_budget_bytes: 48000
                  context_file_max_bytes: 12000
      responses:
        '200':
          description: Prompt output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptOutput'
        '400':
          $ref: '#/components/responses/ApiErrorResponse'
  /api/review:
    post:
      summary: Execute single-pass review
      operationId: executeReview
      tags: [review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewArgs'
            examples:
              standard:
                value:
                  model: gpt-5.4
                  prompt_args:
                    mode: standard
                    stack: Rust + Axum + PostgreSQL
                    goal: 修复重复下单
                    rules:
                      - 一个订单只能支付一次
                      - 幂等键必须生效
                    files:
                      - src/order/service.rs
                    format: json
      responses:
        '200':
          description: Review result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewApiResponse'
        '400':
          $ref: '#/components/responses/ApiErrorResponse'
  /api/deep-review:
    post:
      summary: Execute two-stage deep review
      operationId: executeDeepReview
      tags: [review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeepReviewArgs'
            examples:
              critical:
                value:
                  git: HEAD~1..HEAD
                  repo: .
                  model: gpt-5.4
                  prompt:
                    mode: critical
                    stack: Rust + Axum + PostgreSQL
                    goal: 修复重复下单
                    rules:
                      - 一个订单只能支付一次
                      - 幂等键必须生效
                    focus:
                      - 支付安全
                      - 事务一致性
                    format: json
                  include_context: true
                  context_budget_bytes: 48000
                  context_file_max_bytes: 12000
      responses:
        '200':
          description: Deep review result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeepReviewApiResponse'
        '400':
          $ref: '#/components/responses/ApiErrorResponse'
  /api/review-sessions:
    get:
      summary: List review sessions
      operationId: listReviewSessions
      tags: [sessions]
      parameters:
        - in: query
          name: repo
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: mode
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated session summaries ordered by updated_at desc
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
    post:
      summary: Create a new multi-turn review session
      operationId: createReviewSession
      tags: [sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewSessionRequest'
      responses:
        '200':
          description: Session detail after turn 1 (or Failed status if admission blocked)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSessionDetail'
        '400':
          $ref: '#/components/responses/ApiErrorResponse'
  /api/review-sessions/{id}:
    get:
      summary: Get full detail of a review session
      operationId: getReviewSession
      tags: [sessions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Session detail (session + turns + messages + findings + artifacts)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSessionDetail'
        '404':
          $ref: '#/components/responses/ApiErrorResponse'
    delete:
      summary: Permanently delete a session and its artifacts
      operationId: deleteReviewSession
      tags: [sessions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/ApiErrorResponse'
  /api/review-sessions/{id}/turns:
    post:
      summary: Append a follow-up turn to the session
      operationId: appendReviewTurn
      tags: [sessions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendReviewTurnRequest'
      responses:
        '200':
          description: Updated session detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSessionDetail'
        '404':
          $ref: '#/components/responses/ApiErrorResponse'
  /api/review-sessions/{id}/findings/{finding_id}:
    patch:
      summary: Update a finding's status / owner / tags
      operationId: updateReviewFinding
      tags: [sessions]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: finding_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FindingPatch'
      responses:
        '200':
          description: Updated finding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewFinding'
        '404':
          $ref: '#/components/responses/ApiErrorResponse'
        '409':
          $ref: '#/components/responses/ApiErrorResponse'
components:
  responses:
    ApiErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            default:
              value:
                error: review blocked: standard 模式缺少必需上下文: rules
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthResponse:
      type: object
      required: [ok, service]
      properties:
        ok:
          type: boolean
        service:
          type: string
    ModelList:
      type: object
      properties:
        provider:
          type: string
        models:
          type: array
          items:
            type: string
        default_model:
          type: string
          nullable: true
        source:
          type: string
    ReviewMode:
      type: string
      enum: [lite, standard, critical]
    OutputFormat:
      type: string
      enum: [text, json]
    PromptArgs:
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/ReviewMode'
        stack:
          type: string
          nullable: true
        goal:
          type: string
          nullable: true
        why:
          type: string
          nullable: true
        rules:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        expected_normal:
          type: string
          nullable: true
        expected_error:
          type: string
          nullable: true
        expected_edge:
          type: string
          nullable: true
        issue:
          type: string
          nullable: true
        test_results:
          type: array
          items:
            type: string
        jira:
          type: string
          nullable: true
        jira_base_url:
          type: string
          nullable: true
        jira_provider:
          type: string
        jira_command:
          type: string
          nullable: true
        diff_file:
          type: string
          nullable: true
        context_files:
          type: array
          items:
            type: string
        files:
          type: array
          items:
            type: string
        focus:
          type: array
          items:
            type: string
        baseline_files:
          type: array
          items:
            type: string
        change_type:
          type: string
          nullable: true
        format:
          $ref: '#/components/schemas/OutputFormat'
    RunArgs:
      type: object
      required: [git, repo, prompt, include_context, context_budget_bytes, context_file_max_bytes]
      properties:
        git:
          type: string
        repo:
          type: string
        prompt:
          $ref: '#/components/schemas/PromptArgs'
        include_context:
          type: boolean
        context_budget_bytes:
          type: integer
        context_file_max_bytes:
          type: integer
    ReviewArgs:
      type: object
      properties:
        prompt:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        prompt_args:
          $ref: '#/components/schemas/PromptArgs'
    DeepReviewArgs:
      type: object
      required: [git, repo, prompt, include_context, context_budget_bytes, context_file_max_bytes]
      properties:
        git:
          type: string
        repo:
          type: string
        model:
          type: string
          nullable: true
        prompt:
          $ref: '#/components/schemas/PromptArgs'
        include_context:
          type: boolean
        context_budget_bytes:
          type: integer
        context_file_max_bytes:
          type: integer
    AdmissionResult:
      type: object
      properties:
        ok:
          type: boolean
        level:
          type: string
        score:
          type: integer
        confidence:
          type: string
        missing_p0:
          type: array
          items:
            type: string
        missing_p1:
          type: array
          items:
            type: string
        missing_p2:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        block_reasons:
          type: array
          items:
            type: string
        suggestions:
          type: array
          items:
            type: string
    PromptSummary:
      type: object
      properties:
        stack:
          type: string
          nullable: true
        goal:
          type: string
          nullable: true
        issue:
          type: string
          nullable: true
        rules_count:
          type: integer
        risks:
          type: array
          items:
            type: string
        test_results_count:
          type: integer
        files:
          type: array
          items:
            type: string
        context_files:
          type: array
          items:
            type: string
        has_diff:
          type: boolean
    PromptOutput:
      type: object
      properties:
        ok:
          type: boolean
        score:
          type: integer
        prompt:
          type: string
        summary:
          $ref: '#/components/schemas/PromptSummary'
    ReviewIssue:
      type: object
      properties:
        title:
          type: string
        file:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true
        trigger:
          type: string
          nullable: true
        impact:
          type: string
          nullable: true
        suggestion:
          type: string
          nullable: true
    MissingTestCase:
      type: object
      properties:
        title:
          type: string
        scenario:
          type: string
          nullable: true
    RiskHintView:
      type: object
      properties:
        title:
          type: string
        detail:
          type: string
        source:
          type: string
    ValidationFinding:
      type: object
      properties:
        severity:
          type: string
        field:
          type: string
        message:
          type: string
    ReviewValidationReport:
      type: object
      properties:
        ok:
          type: boolean
        repaired:
          type: boolean
        findings:
          type: array
          items:
            $ref: '#/components/schemas/ValidationFinding'
    ReviewResult:
      type: object
      properties:
        mode:
          type: string
        input_ok:
          type: boolean
        input_level:
          type: string
        input_score:
          type: integer
        confidence:
          type: string
        high_risk:
          type: array
          items:
            $ref: '#/components/schemas/ReviewIssue'
        medium_risk:
          type: array
          items:
            $ref: '#/components/schemas/ReviewIssue'
        low_risk:
          type: array
          items:
            $ref: '#/components/schemas/ReviewIssue'
        missing_tests:
          type: array
          items:
            $ref: '#/components/schemas/MissingTestCase'
        summary:
          type: string
        needs_human_review:
          type: boolean
        used_rules:
          type: array
          items:
            type: string
        impact_scope:
          type: array
          items:
            type: string
        release_checks:
          type: array
          items:
            type: string
        risk_hints:
          type: array
          items:
            $ref: '#/components/schemas/RiskHintView'
        validation_report:
          allOf:
            - $ref: '#/components/schemas/ReviewValidationReport'
          nullable: true
        repair_attempted:
          type: boolean
        repair_succeeded:
          type: boolean
        raw_text:
          type: string
    ReviewApiResponse:
      type: object
      properties:
        exit_code:
          type: integer
        result:
          $ref: '#/components/schemas/ReviewResult'
    AnalyzeApiResponse:
      type: object
      properties:
        strategy:
          type: string
        admission:
          $ref: '#/components/schemas/AdmissionResult'
        prompt:
          $ref: '#/components/schemas/PromptOutput'
        review:
          allOf:
            - $ref: '#/components/schemas/ReviewResult'
          nullable: true
        stage1:
          allOf:
            - $ref: '#/components/schemas/ReviewResult'
          nullable: true
        stage2:
          allOf:
            - $ref: '#/components/schemas/ReviewResult'
          nullable: true
        exit_code:
          type: integer
    DeepReviewApiResponse:
      type: object
      properties:
        exit_code:
          type: integer
        stage1:
          $ref: '#/components/schemas/ReviewResult'
        stage2:
          $ref: '#/components/schemas/ReviewResult'
    ConversationStatus:
      type: string
      enum: [created, running, waiting_input, completed, failed, cancelled]
    TurnKind:
      type: string
      enum: [discovery, deep_dive, business_check, final_report, manual_followup]
    TurnStatus:
      type: string
      enum: [pending, running, completed, failed, skipped]
    MessageRole:
      type: string
      enum: [system, user, assistant, tool]
    FindingSeverity:
      type: string
      enum: [critical, high, medium, low, info]
    FindingStatus:
      type: string
      enum: [suspected, confirmed, dismissed, fixed, accepted_risk]
    FindingCategory:
      type: string
      enum: [logic, security, performance, compatibility, data, testability, release, maintainability, style, unknown]
    ArtifactType:
      type: string
      enum: [diff, context_file, prompt, response, report, jira, test_result, snapshot, other]
    FindingCounts:
      type: object
      properties:
        total: { type: integer }
        high: { type: integer }
        medium: { type: integer }
        low: { type: integer }
        confirmed: { type: integer }
        dismissed: { type: integer }
    SessionSummary:
      type: object
      required: [id, status, review_mode, repo_root, provider, model, current_turn, total_turns, finding_counts, created_at, updated_at]
      properties:
        id: { type: string }
        title: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/ConversationStatus' }
        review_mode: { $ref: '#/components/schemas/ReviewMode' }
        repo_root: { type: string }
        provider: { type: string }
        model: { type: string }
        current_turn: { type: integer }
        total_turns: { type: integer }
        finding_counts: { $ref: '#/components/schemas/FindingCounts' }
        admission_ok: { type: boolean, nullable: true }
        last_error: { type: string, nullable: true }
        created_at: { type: string }
        updated_at: { type: string }
        completed_at: { type: string, nullable: true }
    AdmissionSnapshot:
      type: object
      properties:
        ok: { type: boolean }
        level: { type: string }
        score: { type: integer }
        confidence: { type: string }
        block_reasons: { type: array, items: { type: string } }
        missing_required: { type: array, items: { type: string } }
    CodeLocation:
      type: object
      properties:
        file_path: { type: string }
        line_start: { type: integer, nullable: true }
        line_end: { type: integer, nullable: true }
        symbol: { type: string, nullable: true }
    FindingEvidence:
      type: object
      properties:
        kind: { type: string }
        summary: { type: string }
        content: { type: string, nullable: true }
        artifact_id: { type: string, nullable: true }
    ReviewFinding:
      type: object
      required: [id, session_id, severity, category, status, title, description, created_at, updated_at]
      properties:
        id: { type: string }
        code: { type: string, nullable: true }
        session_id: { type: string }
        source_turn_id: { type: string, nullable: true }
        severity: { $ref: '#/components/schemas/FindingSeverity' }
        category: { $ref: '#/components/schemas/FindingCategory' }
        status: { $ref: '#/components/schemas/FindingStatus' }
        title: { type: string }
        description: { type: string }
        rationale: { type: string, nullable: true }
        suggestion: { type: string, nullable: true }
        confidence: { type: number, nullable: true }
        owner: { type: string, nullable: true }
        location: { $ref: '#/components/schemas/CodeLocation' }
        evidence: { type: array, items: { $ref: '#/components/schemas/FindingEvidence' } }
        related_files: { type: array, items: { type: string } }
        tags: { type: array, items: { type: string } }
        last_seen_turn: { type: integer, nullable: true }
        created_at: { type: string }
        updated_at: { type: string }
        resolved_at: { type: string, nullable: true }
    ReviewMessage:
      type: object
      required: [id, session_id, seq_no, role, content, format, created_at]
      properties:
        id: { type: string }
        session_id: { type: string }
        turn_id: { type: string, nullable: true }
        seq_no: { type: integer }
        role: { $ref: '#/components/schemas/MessageRole' }
        author: { type: string, nullable: true }
        content: { type: string }
        format: { type: string, enum: [text, markdown, json] }
        created_at: { type: string }
    ReviewTurn:
      type: object
      required: [id, session_id, turn_no, kind, status, created_at, updated_at]
      properties:
        id: { type: string }
        session_id: { type: string }
        turn_no: { type: integer }
        kind: { $ref: '#/components/schemas/TurnKind' }
        status: { $ref: '#/components/schemas/TurnStatus' }
        input_summary: { type: string, nullable: true }
        instruction: { type: string, nullable: true }
        requested_files: { type: array, items: { type: string } }
        attached_files: { type: array, items: { type: string } }
        focus_finding_ids: { type: array, items: { type: string } }
        prompt_text: { type: string, nullable: true }
        response_text: { type: string, nullable: true }
        parsed_result: { $ref: '#/components/schemas/ReviewResult' }
        token_input: { type: integer, nullable: true }
        token_output: { type: integer, nullable: true }
        latency_ms: { type: integer, nullable: true }
        started_at: { type: string, nullable: true }
        completed_at: { type: string, nullable: true }
        created_at: { type: string }
        updated_at: { type: string }
    ReviewConversationState:
      type: object
      properties:
        requested_files: { type: array, items: { type: string } }
        attached_files: { type: array, items: { type: string } }
        findings: { type: array, items: { $ref: '#/components/schemas/ReviewFinding' } }
        pending_finding_ids: { type: array, items: { type: string } }
        confirmed_finding_ids: { type: array, items: { type: string } }
        dismissed_finding_ids: { type: array, items: { type: string } }
        release_checks: { type: array, items: { type: string } }
        impact_scope: { type: array, items: { type: string } }
    ReviewSession:
      type: object
      required: [id, status, review_mode, strategy, repo_root, provider, model, current_turn, total_turns, state, created_at, updated_at]
      properties:
        id: { type: string }
        title: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/ConversationStatus' }
        review_mode: { $ref: '#/components/schemas/ReviewMode' }
        strategy: { type: string }
        repo_root: { type: string }
        base_ref: { type: string, nullable: true }
        head_ref: { type: string, nullable: true }
        provider: { type: string }
        model: { type: string }
        temperature: { type: number, nullable: true }
        current_turn: { type: integer }
        total_turns: { type: integer }
        admission: { $ref: '#/components/schemas/AdmissionSnapshot' }
        state: { $ref: '#/components/schemas/ReviewConversationState' }
        final_summary: { type: string, nullable: true }
        final_report: { $ref: '#/components/schemas/ReviewResult' }
        last_error: { type: string, nullable: true }
        created_by: { type: string, nullable: true }
        created_at: { type: string }
        updated_at: { type: string }
        completed_at: { type: string, nullable: true }
    ReviewArtifact:
      type: object
      required: [id, session_id, artifact_type, name, created_at]
      properties:
        id: { type: string }
        session_id: { type: string }
        turn_id: { type: string, nullable: true }
        artifact_type: { $ref: '#/components/schemas/ArtifactType' }
        name: { type: string }
        path: { type: string, nullable: true }
        content: { type: string, nullable: true }
        mime_type: { type: string, nullable: true }
        size_bytes: { type: integer, nullable: true }
        hash: { type: string, nullable: true }
        created_at: { type: string }
    ReviewSessionDetail:
      type: object
      required: [session, turns, messages, findings, artifacts]
      properties:
        session: { $ref: '#/components/schemas/ReviewSession' }
        turns: { type: array, items: { $ref: '#/components/schemas/ReviewTurn' } }
        messages: { type: array, items: { $ref: '#/components/schemas/ReviewMessage' } }
        findings: { type: array, items: { $ref: '#/components/schemas/ReviewFinding' } }
        artifacts: { type: array, items: { $ref: '#/components/schemas/ReviewArtifact' } }
    CreateReviewSessionRequest:
      type: object
      required: [repo_root, review_mode, prompt_args]
      properties:
        repo_root: { type: string }
        review_mode: { $ref: '#/components/schemas/ReviewMode' }
        provider: { type: string, nullable: true }
        model: { type: string, nullable: true }
        base_ref: { type: string, nullable: true }
        head_ref: { type: string, nullable: true }
        diff_text: { type: string, nullable: true }
        prompt_args: { $ref: '#/components/schemas/PromptArgs' }
        initial_instruction: { type: string, nullable: true }
    AppendReviewTurnRequest:
      type: object
      properties:
        instruction: { type: string, nullable: true }
        attached_files: { type: array, items: { type: string } }
        extra_context: { type: array, items: { type: string } }
        focus_finding_ids: { type: array, items: { type: string } }
        finalize: { type: boolean, nullable: true }
        model: { type: string, nullable: true, description: 'Optional per-turn model override; does not change session.model' }
    FindingPatch:
      type: object
      properties:
        status: { $ref: '#/components/schemas/FindingStatus' }
        owner: { type: string, nullable: true }
        tags: { type: array, items: { type: string }, nullable: true }
    SessionListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/SessionSummary' } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
